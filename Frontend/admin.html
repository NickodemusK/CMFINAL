<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CloudMart Admin Dashboard</title>

  <style>
    * { box-sizing: border-box; margin:0; padding:0; }

    body {
      font-family: system-ui, Arial, sans-serif;
      background: #0b1020;
      color: #fff;
      padding: 20px;
    }

    .site-header {
      background: #111827;
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .site-header h1 {
      font-size: 1.6rem;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.5);
      background: transparent;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.1);
    }

    /* 🔥 FIXED BUTTON VISIBILITY */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .metric-btn {
      background: linear-gradient(145deg, #111827, #0b1020);
      border: 1px solid rgba(147,197,253,0.35);
      border-radius: 12px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .metric-btn:hover {
      border-color: #60a5fa;
      box-shadow: 0 0 12px rgba(96,165,250,0.4);
      transform: translateY(-2px);
    }

    .metric-btn h3 {
      color: #cbd5f5;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .metric-value {
      font-size: 2rem;
      font-weight: bold;
      color: #60a5fa;
    }

    .panel {
      background: #111827;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .panel h2 {
      margin-bottom: 12px;
      font-size: 1.2rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 0.95rem;
    }

    th {
      color: #93c5fd;
    }

    tr:hover td {
      background: rgba(255,255,255,0.03);
    }
  </style>
</head>

<body>

<header class="site-header">
  <h1>CloudMart Admin Dashboard</h1>
  <button class="btn" onclick="goHome()">← Back</button>
</header>

<section class="metrics-grid">
  <button class="metric-btn">
    <h3>Total Listings</h3>
    <div id="totalListings" class="metric-value">0</div>
  </button>

  <button class="metric-btn">
    <h3>Total Users</h3>
    <div id="totalUsers" class="metric-value">0</div>
  </button>

  <button class="metric-btn">
    <h3>Total Sold</h3>
    <div id="totalSold" class="metric-value">0</div>
  </button>
  <!-- Created by Howard Anmes III -->
  <button class="metric-btn" onclick="goToReturnsPage()">
    <h3>Total Returns</h3>
    <div id="totalReturns" class="metric-value">0</div>
  </button>

  <button class="metric-btn">
    <h3>Total Value</h3>
    <div id="totalValue" class="metric-value">$0</div>
  </button>
</section>

<section class="panel">
  <h2>Listings</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>User</th>
        <th>Title</th>
        <th>Price</th>
        <th>Status</th>
        <th>Buyer</th>
      </tr>
    </thead>
    <tbody id="listingsTable"></tbody>
  </table>
</section>

<section class="panel">
  <h2>Users</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Email</th>
        <th>Username</th>
        <th>Role</th>
      </tr>
    </thead>
    <tbody id="usersTable"></tbody>
  </table>
</section>

<section class="panel">
  <h2>Return Requests</h2>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Listing</th>
        <th>Buyer</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Created</th>
      </tr>
    </thead>
    <tbody id="returnsTable"></tbody>
  </table>
</section>

<script>
const API = "http://localhost:5001";
const user = JSON.parse(localStorage.getItem("user"));

if (!user || user.role !== "admin") {
  alert("Admins only");
  window.location.href = "Signin.html";
}

function goHome() {
  window.location.href = "index.html";
}

function goToReturnsPage() {
  window.location.href = "admin-returns.html";
}

function escapeHtml(str) {
  if (!str) return "";
  return str.replace(/[&<>"']/g, m => ({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  })[m]);
}

async function loadAdminDashboard() {
  const res = await fetch(`${API}/api/admin/dashboard?role=${user.role}`);
  const data = await res.json();

  document.getElementById("totalUsers").innerText = data.summary.total_users;
  document.getElementById("totalListings").innerText = data.summary.total_listings;
  document.getElementById("totalSold").innerText = data.summary.total_sold;
  document.getElementById("totalValue").innerText = `$${data.summary.total_value}`;

  const returns = data.return_requests || [];
  document.getElementById("totalReturns").innerText = returns.length;

  const listingsTable = document.getElementById("listingsTable");
  listingsTable.innerHTML = "";
  data.listings.forEach(l => {
    listingsTable.innerHTML += `
      <tr>
        <td>${l.id}</td>
        <td>${l.user_id}</td>
        <td>${escapeHtml(l.title)}</td>
        <td>$${l.price}</td>
        <td>${l.status}</td>
        <td>${l.buyer_email || ""}</td>
      </tr>
    `;
  });

  const usersTable = document.getElementById("usersTable");
  usersTable.innerHTML = "";
  data.users.forEach(u => {
    usersTable.innerHTML += `
      <tr>
        <td>${u.id}</td>
        <td>${escapeHtml(u.email)}</td>
        <td>${escapeHtml(u.username)}</td>
        <td>${u.role}</td>
      </tr>
    `;
  });

  const returnsTable = document.getElementById("returnsTable");
  returnsTable.innerHTML = "";

  if (returns.length === 0) {
    returnsTable.innerHTML = "<tr><td colspan='6'>No returns</td></tr>";
  }

  returns.forEach(r => {
    returnsTable.innerHTML += `
      <tr>
        <td>${r.id}</td>
        <td>${escapeHtml(r.title)}</td>
        <td>${escapeHtml(r.buyer_email)}</td>
        <td>${escapeHtml(r.reason)}</td>
        <td>${r.status}</td>
        <td>${r.created_at || ""}</td>
      </tr>
    `;
  });
}

loadAdminDashboard();
</script>

</body>
</html>
